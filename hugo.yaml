  # Experience
  experience:
    enable: true
    # title: "Custom Name"
    items:
      - company: "Your Best Company"
        companyUrl: "https://your_company.com"
        jobs:
          - name: "Member of your dream team"
            date: "Now"
            content: Development, support or modernization your IT system. I will help you make something truly good and convenient for many people.
            info:
              content: Independent developer or within your team

      - company: "VK"
        companyUrl: "https://vk.company/ru/"
        jobs:
          - name: "Backend Developer"
            date: "January 2017 - October 2025"
            content: |
              - Designed and developed systems for asset tracking, infrastructure monitoring, and private cloud solutions across large-scale platforms (VK, Mail.ru, Odnoklassniki)  
              - Built backend services using ASP.NET / .NET Core and frontend applications using Angular, React, and Blazor  
              - Migrated legacy applications from ASP.NET + legacy JavaScript stack to modern .NET Core + React/Angular/Blazor architectures  
              - Performed zero-downtime database migrations from MS SQL Server to PostgreSQL, including schema, data, and stored procedures optimization  
              - Developed and maintained data storage systems using MS SQL Server and NoSQL databases (MongoDB, Cassandra), integrated with Kafka for real-time data processing  
              - Automated routine operations (backups, index maintenance, alerting, health checks, deployments)  
              - Optimized performance of critical queries and infrastructure for high-load environments  
              - Worked in cross-functional roles: analyst, product owner, database developer, backend and frontend engineer, system administrator  
              - Managed and supported 4–6 infrastructure applications simultaneously  
              - Conducted code reviews, wrote unit tests, and maintained backlog
            info:
              content: Development, support, administration of 5 applications in team  of 2-5 members

      - company: "Luxoft"
        companyUrl: "https://luxoft.com"
        jobs:
          - name: "Senior SQL Server Developer"
            date: "July 2015 - January 2017"
            content: |
              - Developed centralized enterprise Data Warehouse (DWH) on MS SQL Server + SSIS for Kaspersky Lab  
              - Designed complex ETL pipelines (data ingestion, enrichment, CDC, SCD) from 10+ data sources  
              - Integrated DWH with .NET applications and SharePoint  
              - Ensured high performance and fault tolerance for multi-terabyte data systems  
              - Implemented integration layer based on business analyst specifications  
              - Performed code reviews  
            info:
              content: Create new data transforamtion and integration project in a team of 5 members

      - company: "Moneks traiding"
        companyUrl: "http://www.moneks.ru/"
        jobs: 
          - name: "BI Developer"
            date: "June 2011 - July 2015"
            content: | 
              - Built enterprise analytics platform (DWH + reporting server) using SQL Server (SSIS, SSAS, SSRS) for major retail brands (Starbucks, Mothercare, MAC, The Body Shop, etc.)  
              - Migrated systems to SQL Server 2012  
              - Optimized OLAP cubes and queries, significantly improving reporting performance  
              - Administered Windows servers  
              - Implemented SAP BusinessObjects reporting (WEBI, Dashboards)  
              - Trained business analysts  
              - Led development, maintenance, administration, backlog management, and business requirements analysis in a small team 
            info:
              content: Create DWH in a team of 2 members

      - company: "Coca-Cola HBC Russia"
        companyUrl: "https://coca-colahellenic.ru"
        jobs:
        - name: "Business System Expert"
          date: "August 2005 - June 2011"
          content: | 
            - Developed reporting systems on Microsoft SQL Server (Analysis Services, DTS, Reporting Services)  
            - Migrated DWH to SQL Server 2005 (SSIS, SSAS, SSRS)  
            - Built DWH solutions and reports for production, warehouse, sales, and logistics departments  
            - Optimized database performance  
            - Automated routine processes  
            - Ensured high availability of MS SQL and Windows Server systems  
            - Performed roles including analyst, product owner, database developer, and system administrator 
          info:
              content: Create DWH applications in a team of 2 members

      - company: "PSS"
        companyUrl: "http://pss.ru"
        jobs:
        - name: "IT specialist"
          date: "August 2004 - August 2005"
